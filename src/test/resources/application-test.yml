spring:
  application:
    name: knowledge-service-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: knowledge-service-test-group
      auto-offset-reset: earliest

jwt:
  secret: test-jwt-secret-key-for-authentication-minimum-256-bits-required
  expiration: 86400000

logging:
  level:
    root: WARN
    com.cognizant.knowledge_service: DEBUG

server:
  port: 8085

spring:
  application:
    name: knowledge-service
  datasource:
    url: jdbc:postgresql://localhost:5432/knowledge_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: knowledge-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer wraps the JSON deserializer so a single bad payload
      # doesn't enter an infinite retry loop. We caught one of these blowing the log
      # file to ~615 MB before truncation. The bad record is logged once and skipped;
      # the listener stays healthy and can keep consuming the rest of the topic.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jwt:
  secret: myVerySecretKeyForJWTThatIsLongEnoughForHS512Signature
  expiration: 3600000

logging:
  level:
    root: INFO
    com.cognizant.knowledge_service: DEBUG
    org.springframework.security: DEBUG

version: '3.8'

services:
  knowledge-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/knowledge_service_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JWT_SECRET=knowledge-service-jwt-secret-key-for-authentication-minimum-256-bits
    depends_on:
      - postgres
      - kafka
    networks:
      - knowledge-network

  postgres:
    image: postgres:15-alpine
    container_name: knowledge-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=knowledge_service_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - knowledge-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: knowledge-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - knowledge-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: knowledge-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - knowledge-network

networks:
  knowledge-network:
    driver: bridge

volumes:
  postgres-data:
